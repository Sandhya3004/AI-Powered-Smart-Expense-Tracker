# Server - Graceful shutdown
server.port=${SERVER_PORT:5050}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# PostgreSQL Database (credentials loaded from .env file)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling - Fixed HikariCP Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (with default fallback for development)
jwt.secret=${JWT_SECRET:myDefaultDevelopmentSecretKeyForLocalTestingOnly}
jwt.expiration=${JWT_EXPIRATION:86400}

# File Upload - Increased limits for large files
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.enabled=true
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.base-url=${UPLOAD_BASE_URL:http://localhost:5050}

# AI Service
ai.service.url=${AI_SERVICE_URL:https://ai-service-g0mn.onrender.com}

# Gemini AI Service
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Logging
logging.level.org.springframework.security=${LOG_LEVEL:DEBUG}
logging.level.com.expense=${LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL:DEBUG}

# Development
spring.devtools.restart.enabled=${DEVTOOLS_ENABLED:true}
spring.jpa.open-in-view=false

# Exclude H2 console auto-configuration (since we're using PostgreSQL)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Actuator (Health checks for Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.db.enabled=true
management.health.diskspace.enabled=true
